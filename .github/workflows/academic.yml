name: Academic Metrics Update

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install and Run Bibliometrics
        env:
          SCHOLAR_ID: 4fE3QFcAAAAJ
        run: |
          python3 -m pip install --upgrade pip
          python3 -m pip install bibliometrics
          
          # Garante que a pasta existe
          mkdir -p academic_metrics
          
          # Debug: Mostra se o arquivo de config está no lugar certo
          ls -la .bibliometrics.config.json || echo "AVISO: Arquivo de configuração não encontrado na raiz!"
          
          # Roda o script
          python3 -m bibliometrics

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Verifica se os arquivos foram gerados antes de tentar o commit
          if [ -d "academic_metrics" ] && [ "$(ls -A academic_metrics)" ]; then
            git add academic_metrics/
            git commit -m "Update academic stats" || echo "No changes to commit"
            git push
          else
            echo "Erro: Arquivos não foram gerados em academic_metrics"
            exit 1
          fi