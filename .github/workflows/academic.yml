name: Academic Metrics Update

on:
  push:
    branches: [ main ]  # <--- Adicione isso
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write    # IMPORTANTE: Dá permissão para o robô escrever no seu repo
    steps:
      - uses: actions/checkout@v4
      
      - name: Update Bibliometrics
        uses: cicirello/bibliometrics@v1
        with:
          scholar-id: 4fE3QFcAAAAJ
          result-path: academic_metrics
          colors-title: '#abd200'
          colors-text: '#e1e1e1'
          colors-background: '#1c1c1c'

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add academic_metrics/
          git commit -m "Update academic stats" || echo "No changes to commit"
          git push