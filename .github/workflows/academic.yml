name: Academic Metrics Update

on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install and Run Bibliometrics
        env:
          SCHOLAR_ID: 4fE3QFcAAAAJ  # Configura seu ID via variável de ambiente
        run: |
          python3 -m pip install bibliometrics  # Instala o pacote
          # Cria a pasta de destino para evitar erros
          mkdir -p academic_metrics
          # Executa o utilitário
          python3 -m bibliometrics

      - name: Commit and Push
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add academic_metrics/
          git commit -m "Update academic stats" || echo "No changes to commit"
          git push